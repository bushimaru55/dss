# Table Intelligence API — OpenAPI 叩き台
# -----------------------------------------------------------------------------
# 正本: SPEC-TI-014（API 契約）, SPEC-TI-006（DTO / 列挙 / ref）
# 位置づけ: 実装接続フェーズの初期ドラフト。未確定は description / TODO で明示。
# last_updated: 2026-04-03 (0.1.8 stale metadata 409)
# document_version: 0.1.8-draft
# -----------------------------------------------------------------------------

openapi: 3.1.0
info:
  title: Table Intelligence API
  version: 0.1.8-draft
  description: |
    表解析パイプラインの **API 叩き台**（OpenAPI 3.1）。

    **正本**
    - 契約・振る舞い: [SPEC-TI-014](../SPEC-TI-014-api.md)
    - DTO・列挙・識別子: [SPEC-TI-006](../../01_foundation/SPEC-TI-006-io-data.md)

    **ID / ref（レイヤ差）**
    - `evaluation_ref`（API・Job 応答）と DB 主キー `evaluation_id` は **同一キー空間**（015 §5.2）。
    - `suggestion_run_ref`（API・Job 応答）と DB 主キー `suggestion_run_id` は **同一キー空間**。
    - 人確認は **`session_id` のみ**を用いる（`review_session_id` は採用しない）。

    **責務**
    - `decision`: 002 Judgment（一次判定）。
    - `decision_recommendation`: 011 の推奨（002 を上書きしない）。
    - suppression の正本: 005。suggestion で suppression 適用済みを返す場合も **005 の状態を読んだ結果**である（本 API は窓口）。

    TODO: 認証スキーム詳細、ページネーション、012 の細粒度 `error_code` マトリクスは次版で確定。

    **MVP 実装整合（0.1.1）**
    - Django バックエンド実装に合わせ、Jobs の受理形・`TiMvpJobSummary` / `TiMvpJobDetail`、suppression GET の配列レスポンス、rerun の **201**、冪等 **200** をドラフトに反映した。
    - 006 完全準拠の `JobKind` / `HumanReviewSession.table_id` 等は **Phase 4** で本スキーマと実装の双方を厳密化する。
    - **クライアント向け**: 何に依存してよいか／Phase 4 で何が変わるかは **SPEC-TI-014 §18** を正とする。
    - **P4-2（0.1.2）**: `GET /datasets/{id}`, `GET /metadata/{id}`, `GET /evaluations/{ref}`, `GET /review-sessions/{id}` および session **POST 201** のレスポンスを **`TiMvp*` schema** に明示紐付け。006 理想形（`NormalizedDataset` 等）は **Phase 4 目標**として components に残す。
    - **P4-1（0.1.3）**: `/api/v1/*` のエラーレスポンスを **`error_code` + `detail`（+ 任意 `errors`）** のエンベロープに統一（DRF 既定の `detail` 単体をラップ）。`request_id` / `message` は後続。他プレフィックスの `/api/*` は変更なし。
    - **Operation エラー明示（0.1.4）**: 主要 path に **401 / 400 / 404** を OpenAPI 上で列挙。**workspace 越境・存在しない ID は 404 マスク**（014 §14.3）。**403**（`TI_PERMISSION_DENIED`）は DRF 設定により稀にありうるが、MVP 既定は未認証で **401** 寄りのため **全 operation には付けず** `components.responses.Forbidden` のみ維持。**409** の path 割当は **0.1.6 / §13.1** に従う。
    - **Review answers request（0.1.5）**: `POST .../review-sessions/{session_id}/answers` の **事実契約**は **`TiMvpSubmitReviewAnswersRequest`**（`answers[]`: `question_key` + `answer_value` 任意 JSON、任意 `mark_resolved` / `resolution_grade`）。無印 `SubmitReviewAnswersRequest` は **006 Phase 4 向けドラフト**（`deprecated`）に限定。
    - **409 マトリクス（0.1.6）**: **§13.1（SPEC-TI-014）** に合わせ、`GET .../candidates` から **409 を削除**（読取は 200/404）。**`POST /suggestion-runs`** に **stale `metadata_id`（lineage）用の 409 将来枠**を追加。`POST .../answers`・`POST .../review-sessions/.../rerun` の 409 は **将来枠のまま**（MVP 未返却）。
    - **401 列挙（0.1.7）**: **`GET /tables/*`** および **`GET /metadata/{id}/review-points`** に **`Unauthorized`** を追加。[GUIDE-TI-table-intelligence-api-errors.md](../GUIDE-TI-table-intelligence-api-errors.md) および **DRF `IsAuthenticated`** 前提と一致。
    - **stale metadata 409（0.1.8）**: **`POST /suggestion-runs`** のみ、`artifact_relation` に **旧→新 `analysis_metadata` の `TI_JOB_RERUN_SUPERSEDES` / `TI_REVIEW_RERUN_SUPERSEDES`** があるとき **409** + `TI_CONFLICT`（014 §13.1）。

  license:
    name: Proprietary

servers:
  - url: https://api.example.com/v1
    description: Draft base URL（実装で置換）

security:
  - tokenAuth: []

tags:
  - name: Jobs
    description: 実行系。POST は `job_id` / ref を返し、GET で状態・確定 ID を参照（SPEC-TI-014 §4.2）。
  - name: Tables
    description: 観測対象テーブルと読取・判定成果物（001/002）。
  - name: Datasets
    description: 正規化成果（003）。`dataset_id` は 003 の主成果物 ID。
  - name: Metadata
    description: 分析メタ（004）。`metadata_id` は 004 の主成果物 ID。
  - name: ReviewSessions
    description: 人確認（005）。状態遷移の正本は 005。
  - name: Evaluations
    description: 信頼度評価（011）。`decision_recommendation` は本リソースのみ（002 `decision` と混同禁止）。
  - name: Suggestions
    description: 候補生成（013）。**主入力は `metadata_id`**。011/005 は読む側。

paths:
  /table-analysis/jobs:
    post:
      tags: [Jobs]
      operationId: startAnalysisJob
      summary: 表解析ジョブ開始
      description: |
        原本参照を受理し非同期実行。レスポンスは **受理と `job_id`** を主とし、成果物本体は GET で再取得（014 §4.2）。

        **冪等**: ヘッダ `Idempotency-Key`（最大 128 文字）が同一 workspace で再送された場合、**新規行を増やさず**既存ジョブを返す。HTTP は **200**（MVP 実装）。
        新規受理時は **202**。

        **エラー**: 未知・無権限の `workspace_id` は **404 マスク**（越境判別不可）。
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 128
          description: 同一意味の POST の冪等キー（014 §4.5）。workspace スコープと組み合わせて一意。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartAnalysisJobRequest"
      responses:
        "200":
          description: 冪等リプレイ。既存 `job_id` を返し、重複投入しない（MVP）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpJobSummary"
        "202":
          description: 新規ジョブを受理。処理は非同期（テスト用設定ではインライン完了しうる）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpJobSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 未知の `workspace_id`（テナント分離・列挙攻撃対策で 404 マスクしうる。014 §14.3）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /table-analysis/jobs/{job_id}:
    get:
      tags: [Jobs]
      operationId: getAnalysisJob
      summary: ジョブ状態取得
      description: |
        確定済み `table_id` / ref の部分集合を返しうる。
        存在しない `job_id` および **他 workspace のジョブ**は **404 マスク**（同一応答）。
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: OK（MVP は `TiMvpJobDetail`。確定 ref は `artifact_refs` 束に集約）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpJobDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /table-analysis/jobs/{job_id}/rerun:
    post:
      tags: [Jobs]
      operationId: rerunAnalysisJob
      summary: 単一段階 rerun
      description: |
        001〜004 のいずれかから再実行。新 `job_id` ないし成果物世代が発生しうる（014 §12）。
        元 `job_id` が存在しない・越境の場合は **404**。**409**（競合・stale）は将来 014 §12 / §13 で拡張しうるが **MVP では主に未使用**。
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerunJobRequest"
      responses:
        "201":
          description: |
            新 `job_id` のジョブ行を **Created** として返す（MVP・REST 慣習）。パイプライン非同期投入は実装フラグに依存。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpJobSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /tables/{table_id}:
    get:
      tags: [Tables]
      operationId: getTableSummary
      summary: テーブルサマリ取得
      parameters:
        - $ref: "#/components/parameters/TableId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /tables/{table_id}/read-artifact:
    get:
      tags: [Tables]
      operationId: getTableReadArtifact
      summary: TableReadArtifact 取得
      description: |
        006 正本の `TableReadArtifact`（001 観測の器）。
        **MVP 実装**: 永続化テーブル `table_read_artifact` の **`is_latest` 行**から返す。
        行が無い（未 materialize 等）は **404**（越境・不存在は §14.3 と同様に 404 マスク）。
        `cells` は **稀疏**で 001 暫定キー `R{row}C{col}` に寄せたスタブから始まり、本格読取で置換される。
      parameters:
        - $ref: "#/components/parameters/TableId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableReadArtifact"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /tables/{table_id}/decision:
    get:
      tags: [Tables]
      operationId: getJudgmentResult
      summary: Judgment（decision）取得
      description: |
        002 正本の `decision`。011 `decision_recommendation` は含めない。
        **MVP 実装**: 永続化テーブル `judgment_result` の **`is_latest` 行**から返す。
        行が無い（未 materialize 等）は **404**（越境・不存在は §14.3 と同様に 404 マスク）。
        `taxonomy_code` は未確定時 **`TI_TABLE_UNKNOWN`** を用い、空文字は避ける。
      parameters:
        - $ref: "#/components/parameters/TableId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JudgmentResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /tables/{table_id}/artifacts:
    get:
      tags: [Tables]
      operationId: listTableArtifacts
      summary: 関連成果物一覧
      parameters:
        - $ref: "#/components/parameters/TableId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactRefsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /datasets/{dataset_id}:
    get:
      tags: [Datasets]
      operationId: getNormalizedDataset
      summary: NormalizedDataset 取得（MVP 事実形）
      description: |
        **実装契約（0.1.2）**: レスポンスは `TiMvpNormalizedDataset`。
        `NormalizedDataset`（006 理想形・トップレベル `rows` / `trace_map`）は Phase 4 で **additive** 導入予定。現行は `dataset_payload` に集約。
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpNormalizedDataset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /metadata/{metadata_id}:
    get:
      tags: [Metadata]
      operationId: getAnalysisMetadata
      summary: AnalysisMetadata 取得（MVP 事実形）
      description: |
        **実装契約（0.1.2）**: レスポンスは `TiMvpAnalysisMetadata`。
        `AnalysisMetadata`（006 理想形・例: `grain` 必須）は Phase 4 目標。現行は `dimensions` / `measures` / `time_axis` / `decision` 等の MVP 投影。
      parameters:
        - $ref: "#/components/parameters/MetadataId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpAnalysisMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /metadata/{metadata_id}/review-points:
    get:
      tags: [Metadata]
      operationId: listReviewPoints
      summary: review_points 取得
      description: 004 正本の `review_points[]` の投影。
      parameters:
        - $ref: "#/components/parameters/MetadataId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [review_points]
                properties:
                  metadata_id:
                    type: string
                  review_points:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReviewPoint"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /evaluations/{evaluation_ref}:
    get:
      tags: [Evaluations]
      operationId: getConfidenceEvaluation
      summary: ConfidenceEvaluation 取得（MVP 事実形）
      description: |
        パスパラメータ名は `evaluation_ref`。DB PK `evaluation_id` と同一値。
        **実装契約（0.1.2）**: レスポンスは `TiMvpConfidenceEvaluation`。
        `ConfidenceEvaluation`（006 理想形・`scores` / `explanation` / `table_id`）は Phase 4 目標。
      parameters:
        - $ref: "#/components/parameters/EvaluationRef"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpConfidenceEvaluation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /review-sessions:
    post:
      tags: [ReviewSessions]
      operationId: createReviewSession
      summary: review session 作成
      description: |
        参照する `metadata_id` 等が存在しない・越境の場合は **404 マスク**（014 §14.3）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewSessionRequest"
      responses:
        "201":
          description: 作成（MVP 事実形 `TiMvpHumanReviewSession`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpHumanReviewSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /review-sessions/{session_id}:
    get:
      tags: [ReviewSessions]
      operationId: getReviewSession
      summary: review session 取得（MVP 事実形）
      description: |
        **実装契約（0.1.2）**: レスポンスは `TiMvpHumanReviewSession`。
        `HumanReviewSession`（006 理想形・`table_id` / `pending_questions`）は Phase 4 目標。
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpHumanReviewSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /review-sessions/{session_id}/answers:
    post:
      tags: [ReviewSessions]
      operationId: submitReviewAnswers
      summary: answers 登録
      description: |
        **005 MVP 事実形**（Django `SubmitReviewAnswersRequestSerializer`）。**Request**: `TiMvpSubmitReviewAnswersRequest`。
        各回答は **`question_key` + `answer_value`（任意 JSON）** が契約。006 の `point_id` / `client_nonce` / `ReviewAnswer` 完全形とは **未整合**（Phase 4 **additive**）。
        任意 **`mark_resolved`**: `true` のとき session を **RESOLVED** に。**`resolution_grade`**: 任意文字列（最大 64、空・null 可）を session に保存。
        存在しない `session_id`・越境は **404 マスク**。**409** は stale / 二重送信等の **将来枠**（MVP では多く未使用）。
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TiMvpSubmitReviewAnswersRequest"
      responses:
        "200":
          description: |
            **HTTP 200**（実装事実）。`session`（`TiMvpHumanReviewSession`）と `answers`（**本リクエストで作成した行**の `TiMvpHumanReviewAnswer[]`）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpSubmitReviewAnswersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: stale / 競合（将来。014 §13）。MVP では主に未使用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /review-sessions/{session_id}/rerun:
    post:
      tags: [ReviewSessions]
      operationId: rerunAfterReview
      summary: review 後 rerun
      description: |
        005 正本の遷移に従い再パイプラインを起動。
        存在しない `session_id`・越境は **404 マスク**。**409** は将来の状態競合用（MVP では主に未使用）。
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "202":
          description: 上流再実行ジョブを受理（MVP は `TiMvpJobSummary`）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TiMvpJobSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: 状態競合（将来）。MVP では主に未使用。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /review-sessions/{session_id}/suppression:
    get:
      tags: [ReviewSessions]
      operationId: getSuppressionState
      summary: suppression 結果参照
      description: |
        **suppression の正本は 005**。本レスポンスはその投影。suggestion で「抑制済み候補」を返す根拠も 005 に依存。
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: |
            **MVP 実装**: `SuppressionRecord` の **配列**を直接返す（ラッパオブジェクトではない）。
            将来 `SuppressionStateResponse`（`session_id` + `records`）へ正規化しうる。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TiMvpSuppressionRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /suggestion-runs:
    post:
      tags: [Suggestions]
      operationId: startSuggestionRun
      summary: suggestion run 開始
      description: |
        **主入力は `metadata_id`（必須寄り）**。013 は 004 を主入力とし、011/005 を読む側。
        参照 `metadata_id` が存在しない・越境の場合は **404 マスク**。
        **409**: 当該 `metadata_id` が **既に superseded**（`artifact_relation` に **旧 `analysis_metadata` → 新 `analysis_metadata`** の `TI_JOB_RERUN_SUPERSEDES` または `TI_REVIEW_RERUN_SUPERSEDES` がある）。**最新の metadata_id** で再試行（014 §13.1）。**`is_latest` 列は不要**（edge 有無で判定）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSuggestionRunRequest"
      responses:
        "202":
          content:
            application/json:
              schema:
                type: object
                required: [suggestion_run_ref]
                properties:
                  suggestion_run_ref:
                    type: string
                    description: 006 `SuggestionSet.suggestion_run_id` と同一キー空間
                  job_id:
                    type: string
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            **stale / superseded metadata**: `artifact_relation` に当該 ID が **from** 側の metadata SUPERSEDES edge がある。`error_code` は **`TI_CONFLICT`**。本文の `detail` に再取得のヒント。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /suggestion-runs/{suggestion_run_ref}:
    get:
      tags: [Suggestions]
      operationId: getSuggestionSet
      summary: SuggestionSet 取得
      description: |
        存在しない ref・越境は **404 マスク**。
      parameters:
        - $ref: "#/components/parameters/SuggestionRunRef"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionSet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

  /suggestion-runs/{suggestion_run_ref}/candidates:
    get:
      tags: [Suggestions]
      operationId: listSuggestionCandidates
      summary: 候補一覧 / 条件付き取得
      description: |
        - `suppression=applied`: 005 の suppression を反映した結果であることを前提とする（クエリは実装で確定）。
        - `include=recommendation`: 011 由来の `decision_recommendation` 等を同梱しうる（002 `decision` と混在させない）。
        - 存在しない ref・越境は **404 マスク**。
        - **409 は付けない**（読取は成功時 **200** のみ。stale は **`POST /suggestion-runs`** 側で検知—014 §13.1）。
      parameters:
        - $ref: "#/components/parameters/SuggestionRunRef"
        - name: suppression
          in: query
          schema:
            type: string
            enum: [applied, none]
          description: TODO 014 次版で enum 確定
        - name: include
          in: query
          schema:
            type: string
            enum: [recommendation]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [candidates]
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/SuggestionCandidate"
                  decision_recommendation:
                    $ref: "#/components/schemas/DecisionRecommendation"
                    description: include=recommendation 時のみ。011 正本。
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/ErrorResponseDefault"

components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        MVP 既定は DRF **Token** 認証（`Authorization: Token <key>`）。Session 等は実装・環境により異なりうる。

  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    TableId:
      name: table_id
      in: path
      required: true
      schema:
        type: string
    DatasetId:
      name: dataset_id
      in: path
      required: true
      schema:
        type: string
    MetadataId:
      name: metadata_id
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
      description: HumanReviewSession。`review_session_id` は使用しない。
    EvaluationRef:
      name: evaluation_ref
      in: path
      required: true
      schema:
        type: string
      description: API 名。006 `evaluation_id` と同一値。
    SuggestionRunRef:
      name: suggestion_run_ref
      in: path
      required: true
      schema:
        type: string
      description: API 名。006 `suggestion_run_id` と同一値。

  responses:
    BadRequest:
      description: |
        入力検証エラー。`/api/v1/*` では `error_code` は多くの場合 **`TI_VALIDATION_ERROR`**（フィールドエラーは `errors`）。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation:
              summary: フィールド検証
              value:
                error_code: TI_VALIDATION_ERROR
                detail: Validation failed.
                errors:
                  workspace_id:
                    - This field is required.
    NotFound:
      description: |
        リソース不明または **workspace 越境の 404 マスク**（014 §14.3）。`error_code` は **`TI_NOT_FOUND`**。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error_code: TI_NOT_FOUND
                detail: Not found.
    Unauthorized:
      description: |
        未認証。`error_code` は **`TI_AUTHENTICATION_REQUIRED`**（DRF 設定により 401）。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: |
        認可失敗。`error_code` は **`TI_PERMISSION_DENIED`**（DRF により 403 の場合あり）。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 状態不整合・禁止遷移・stale reference 等。`error_code` は **`TI_CONFLICT`** 等（次版で細分化）。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ErrorResponseDefault:
      description: その他エラー。`error_code` は **`TI_ERROR`** 等。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      description: |
        **table_intelligence（`/api/v1/*`）** のエラー **事実契約**（P4-1 / SPEC-TI-012 最小寄せ）。
        DRF 既定の本文を **ラップ**し、**`detail` を維持**しつつ **`error_code` を必須**とする。Phase 4 で `message` / `details` / `request_id` を **additive** 拡張しうる。
        **互換**: 既存クライアントは引き続き `detail` を読める。`error_code` で分岐可能。
      required: [error_code, detail]
      properties:
        error_code:
          type: string
          description: |
            実装が付与する安定キー（`TI_` 接頭辞）。代表: `TI_NOT_FOUND`, `TI_VALIDATION_ERROR`,
            `TI_BAD_REQUEST`, `TI_AUTHENTICATION_REQUIRED`, `TI_PERMISSION_DENIED`, `TI_CONFLICT`, `TI_ERROR`
        detail:
          description: 人向け要約または DRF 由来の `detail`（文字列・配列・オブジェクトのいずれもありうる）
          oneOf:
            - type: string
            - type: object
            - type: array
        errors:
          type: object
          additionalProperties: true
          description: |
            主に HTTP 400 のフィールド検証。キーはフィールド名、値はメッセージの配列（DRF 慣習）。
            `detail` のみで足りる場合は省略。
        message:
          type: string
          description: 012 拡張・英語要約用（省略可。後続 Phase 4）
        details:
          type: object
          additionalProperties: true
          description: 012 構造化補足（省略可。後続 Phase 4）

    StartAnalysisJobRequest:
      type: object
      description: |
        **MVP 実装**は `workspace_id` 必須、`source_type` / `source_ref` / `request_payload` 任意。
        OpenAPI 上の `source_id` / `document_id` は 006・014 次版向け; 実装では `source_ref` 等に寄せうる。
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
        source_type:
          type: string
          description: 原本種別（実装 MVP の文字列ラベル）
        source_ref:
          type: string
          description: 原本参照（URI 等）
        request_payload:
          type: object
          additionalProperties: true
          description: 任意 JSON。rerun lineage や `mvp_pipeline` スナップショットが入りうる（015 `analysis_job` JSON 候補と整合）。
        source_id:
          type: string
          nullable: true
          description: 006 向け予約（MVP 実装未使用の場合あり）
        document_id:
          type: string
          nullable: true
          description: 006 向け予約（MVP 実装未使用の場合あり）
        idempotency_key:
          type: string
          nullable: true
          deprecated: true
          description: ボディでの冪等キー指定は **非推奨**。ヘッダ `Idempotency-Key` を正とする（MVP）。

    RerunJobRequest:
      type: object
      description: |
        MVP 実装は `request_payload` のみ（省略時は元ジョブを複製）。`lineage` はサーバ側でマージされる。
        `from_stage` / `reason` は 014 次版・段階 rerun 向け。
      properties:
        request_payload:
          type: object
          additionalProperties: true
        from_stage:
          type: string
          description: 例 READ, JUDGE, NORMALIZE, META（次版）
        reason:
          type: string

    TiMvpJobSummary:
      type: object
      description: |
        Django MVP のジョブ受理・一覧サマリ。006 `JobKind` 列は **未搭載**のため `kind` は含めない。
        `artifact_refs` は未生成時 **null**、確定後は主要 ID の束（014 の部分集合）。
      required: [job_id, workspace_id, status, current_stage, created_at, artifact_refs]
      properties:
        job_id:
          type: string
        workspace_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        current_stage:
          type: string
          description: 実装固有段階（例 `queued`, `rerun_requested`, `mvp_pipeline_materialized`）。
        created_at:
          type: string
          format: date-time
        artifact_refs:
          oneOf:
            - $ref: "#/components/schemas/ArtifactRefs"
            - type: "null"

    TiMvpJobDetail:
      allOf:
        - $ref: "#/components/schemas/TiMvpJobSummary"
        - type: object
          description: GET ジョブ詳細（MVP）。確定 ref は `artifact_refs` に集約; トップレベル `evaluation_ref` は **MVP では返さない**。
          properties:
            idempotency_key:
              type: string
              nullable: true
            source_type:
              type: string
            source_ref:
              type: string
            request_payload:
              type: object
              additionalProperties: true
            error_code:
              type: string
            error_message:
              type: string
            started_at:
              type: string
              format: date-time
              nullable: true
            completed_at:
              type: string
              format: date-time
              nullable: true
            updated_at:
              type: string
              format: date-time
            requested_by_id:
              type: integer
              nullable: true

    TiMvpNormalizedDataset:
      type: object
      description: |
        Django `NormalizedDatasetSerializer` の事実形（003 MVP）。`rows` / `trace_map` は **トップレベルに無く**
        `dataset_payload` に格納されうる。Phase 4 で 006 `NormalizedDataset` へ **additive** 拡張予定。
      required:
        - dataset_id
        - workspace_id
        - schema_version
        - dataset_payload
        - created_at
        - updated_at
      properties:
        dataset_id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
          nullable: true
          description: 未紐付け時 null
        table_id:
          type: string
          format: uuid
          nullable: true
        workspace_id:
          type: string
        schema_version:
          type: string
        dataset_payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TiMvpAnalysisMetadata:
      type: object
      description: |
        Django `AnalysisMetadataSerializer` の事実形（004 MVP）。`grain` は **未投影**。
        Phase 4 で 006 `AnalysisMetadata` へ **additive** 整合。
      required:
        - metadata_id
        - dataset_id
        - workspace_id
        - review_required
        - review_points
        - dimensions
        - measures
        - decision
        - created_at
        - updated_at
      properties:
        metadata_id:
          type: string
          format: uuid
        dataset_id:
          type: string
          format: uuid
        workspace_id:
          type: string
        review_required:
          type: boolean
        review_points:
          type: array
          items: {}
        dimensions:
          type: array
          items: {}
        measures:
          type: array
          items: {}
        time_axis:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
        decision:
          type: object
          additionalProperties: true
          description: 004 用 JSON。002 Judgment の decision とは別。
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TiMvpConfidenceEvaluation:
      type: object
      description: |
        Django `ConfidenceEvaluationSerializer` の事実形（011 MVP）。`decision_recommendation` は **JSON object**。
        Phase 4 で `scores` / `explanation` / `table_id` 等を **additive** 追加し 006 に寄せる。
      required:
        - evaluation_ref
        - metadata_id
        - workspace_id
        - confidence_score
        - risk_signals
        - decision_recommendation
        - created_at
        - updated_at
      properties:
        evaluation_ref:
          type: string
          format: uuid
          description: パス `evaluation_ref` と同一。DB PK `evaluation_id`。
        metadata_id:
          type: string
          format: uuid
        workspace_id:
          type: string
        confidence_score:
          type: number
        risk_signals:
          type: array
          items: {}
        decision_recommendation:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TiMvpHumanReviewSession:
      type: object
      description: |
        Django `HumanReviewSessionSerializer` の事実形（005 MVP）。`table_id` / `pending_questions` / `answers` は **含まない**。
        Phase 4 で 006 `HumanReviewSession` へ **additive** 拡張予定。
      required:
        - session_id
        - metadata_id
        - workspace_id
        - state
        - review_required_snapshot
        - review_points_snapshot
        - created_at
        - updated_at
      properties:
        session_id:
          type: string
          format: uuid
        metadata_id:
          type: string
          format: uuid
        workspace_id:
          type: string
        state:
          $ref: "#/components/schemas/HumanReviewSessionState"
        review_required_snapshot:
          type: boolean
        review_points_snapshot:
          type: array
          items: {}
        resolution_grade:
          type: string
          nullable: true
        created_by_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JobAcceptedResponse:
      description: 後方互換名。**MVP 実装は `TiMvpJobSummary` と同一形**。
      allOf:
        - $ref: "#/components/schemas/TiMvpJobSummary"

    JobDetail:
      description: 006 完全版向けドラフト。**MVP GET は `TiMvpJobDetail` を参照**。
      allOf:
        - $ref: "#/components/schemas/JobSummary"
        - type: object
          properties:
            error_code:
              type: string
              nullable: true
            evaluation_ref:
              type: string
              nullable: true
              description: 付与時。011 成果物への参照。
            suggestion_run_ref:
              type: string
              nullable: true
              description: 付与時。013 成果物への参照。

    JobSummary:
      type: object
      description: |
        006 `JobRun` 投影のドラフト。**MVP バックエンドは `TiMvpJobSummary` を返す**（`kind` なし）。
      required: [job_id, status]
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        kind:
          $ref: "#/components/schemas/JobKind"
          description: MVP 実装では **省略**（DB 列未導入時）。
        table_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    JobStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
      description: 006 JobRun.status（`CANCELED` は DB 側で保持しうる。MVP パイプラインでは未使用の場合あり）。

    JobKind:
      type: string
      enum: [READ, JUDGE, NORMALIZE, META, SUGGEST]
      description: 006 JobRun.kind（拡張可・TODO）

    ArtifactRefs:
      type: object
      description: 主要 ID の束（014）。
      properties:
        table_id:
          type: string
        dataset_id:
          type: string
          nullable: true
        metadata_id:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        evaluation_ref:
          type: string
          nullable: true
        suggestion_run_ref:
          type: string
          nullable: true

    ArtifactRefsList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactRefs"

    TableSummary:
      type: object
      required: [table_id]
      properties:
        table_id:
          type: string
        refs:
          $ref: "#/components/schemas/ArtifactRefs"

    TableReadArtifact:
      type: object
      description: |
        006 TableReadArtifact。cells は 001 **稀疏**表現（深い nest は Phase 4 で Schema 化）。
        MVP 例: `R0C0` キーに `raw_display` / 座標メタを載せる（bbox だけの別名オブジェクトに置き換えない）。
      required: [artifact_id, table_id, cells, merges, parse_warnings]
      example:
        artifact_id: "6f2c8b9a-1d3e-4c5b-9a8b-1234567890ab"
        table_id: "7a3c8b9a-1d3e-4c5b-9a8b-1234567890cd"
        cells:
          R0C0:
            raw_display: ""
            r: 0
            c: 0
            _mvp_stub: true
            note: "001 MVP sparse placeholder"
        merges: []
        parse_warnings: []
      properties:
        artifact_id:
          type: string
        table_id:
          type: string
        cells:
          type: object
          additionalProperties: true
        merges:
          type: array
          items:
            type: object
            additionalProperties: true
        parse_warnings:
          type: array
          items:
            type: object
            additionalProperties: true

    JudgmentResult:
      type: object
      description: |
        006 JudgmentResult。decision は 002。decision_recommendation は含めない。
        MVP では `taxonomy_code` に **`TI_TABLE_UNKNOWN`** を用いうる（009／002 暫定標準）。
      required: [judgment_id, table_id, decision, taxonomy_code, evidence]
      properties:
        judgment_id:
          type: string
        table_id:
          type: string
        decision:
          $ref: "#/components/schemas/DecisionJudgment"
        taxonomy_code:
          type: string
        evidence:
          type: array
          items:
            type: object
            additionalProperties: true
            description: 006 evidence[] 要素（Phase4 で厳密化）

    DecisionJudgment:
      type: string
      enum: [AUTO_ACCEPT, NEEDS_REVIEW, REJECT]
      description: 002 一次判定（006 §6 decision Judgment）

    DecisionRecommendation:
      type: string
      enum: [AUTO_ACCEPT, NEEDS_REVIEW, REJECT]
      description: 011 の推奨語彙。002 decision と別セマンティクス（006 §6）。

    NormalizedDataset:
      type: object
      description: |
        **006 Phase 4 目標形**。**現行 GET `/datasets/{id}` は `TiMvpNormalizedDataset`**。
        移行時は `dataset_payload` からトップレベル `rows`/`trace_map` への **additive** 複製または段階移行。
      required: [dataset_id, table_id, rows, trace_map]
      properties:
        dataset_id:
          type: string
        table_id:
          type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        trace_map:
          type: object
          additionalProperties: true
        normalization_status:
          type: string
          description: 006 §6 enum。TODO 完全列挙は 006 正本参照。

    AnalysisMetadata:
      type: object
      description: |
        **006 Phase 4 目標形**。**現行 GET `/metadata/{id}` は `TiMvpAnalysisMetadata`**。
        `grain` 等は Phase 4 で **additive**。
      required: [metadata_id, dataset_id, grain, dimensions, measures]
      properties:
        metadata_id:
          type: string
        dataset_id:
          type: string
        grain:
          type: string
        dimensions:
          type: array
          items:
            type: object
            additionalProperties: true
        measures:
          type: array
          items:
            type: object
            additionalProperties: true
        review_points:
          type: array
          items:
            $ref: "#/components/schemas/ReviewPoint"
          description: 任意生成タイミングは 004 正本

    ReviewPoint:
      type: object
      description: 006 review_points[] 要素（014/015 と整合）
      properties:
        point_id:
          type: string
        category:
          type: string
        priority:
          oneOf:
            - type: integer
            - type: string
        severity:
          type: string
        affected_fields:
          type: array
          items:
            type: string
        trace_refs:
          type: array
          items:
            type: object
            additionalProperties: true
        suggested_resolution_type:
          type: string

    HumanReviewSession:
      type: object
      description: |
        **006 Phase 4 目標形**（ドラフト）。**現行 API の GET/POST 201 は `TiMvpHumanReviewSession`**。
        実装は Phase 4 で本スキーマに **additive** 寄せる。
      required: [session_id, table_id, state, pending_questions]
      properties:
        session_id:
          type: string
        table_id:
          type: string
        state:
          $ref: "#/components/schemas/HumanReviewSessionState"
        pending_questions:
          type: array
          items:
            type: object
            additionalProperties: true
        metadata_id:
          type: string
          description: 006 / 005 での関連。Phase 4 で必須化しうる
        answers:
          type: array
          items:
            $ref: "#/components/schemas/ReviewAnswer"
          description: 取得 API で同梱する場合（方針は 005 / 014 次版）

    HumanReviewSessionState:
      type: string
      enum:
        - OPEN
        - IN_PROGRESS
        - WAITING_RERUN
        - PARTIALLY_RESOLVED
        - RESOLVED
        - CLOSED_UNRESOLVED
        - ESCALATED
      description: 006 §6 草案。禁止遷移は 005 正本。

    ReviewAnswer:
      type: object
      properties:
        answer_id:
          type: string
        point_id:
          type: string
        answer_type:
          type: string
        selected_option:
          type: string
          nullable: true
        free_text:
          type: string
          nullable: true
        region_ref:
          type: object
          additionalProperties: true
          nullable: true
        answered_by:
          type: string
        answered_at:
          type: string
          format: date-time

    CreateReviewSessionRequest:
      type: object
      required: [metadata_id]
      properties:
        metadata_id:
          type: string
        table_id:
          type: string
          nullable: true

    TiMvpReviewAnswerItem:
      type: object
      description: |
        Django `ReviewAnswerItemSerializer` の事実形。**006 `ReviewAnswer`（`point_id`, `answer_id`, `answer_type` 等）とは別物**。
      required: [question_key, answer_value]
      properties:
        question_key:
          type: string
          maxLength: 255
          description: 質問識別子（MVP は自由キー。004 `review_points` の `id` 等と対応付けはクライアント責務）。
        answer_value:
          description: |
            Django `JSONField`。任意の JSON 値（オブジェクト・配列・スカラー・null）。MVP テスト例はオブジェクト `{ "ok": true }`。
          example:
            ok: true

    TiMvpSubmitReviewAnswersRequest:
      type: object
      description: |
        Django `SubmitReviewAnswersRequestSerializer` の事実形。`POST .../review-sessions/{session_id}/answers` の **唯一の正しい request**。
        `mark_resolved` / `resolution_grade` は **session 行**の更新に用いる（`submit_review_answers` サービス）。
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/TiMvpReviewAnswerItem"
          description: 1 問 1 要素。空配列は検証上許容（状態遷移は実装ロジック依存）。
        mark_resolved:
          type: boolean
          default: false
          description: |
            `true` のとき、回答追加後に session.state を **RESOLVED** にする（OPEN かつ answers 非空時は **IN_PROGRESS** を経由しうる）。
        resolution_grade:
          type: string
          maxLength: 64
          nullable: true
          description: 非空のとき session.resolution_grade に保存。空文字・null は「未設定」扱い。

    SubmitReviewAnswersRequest:
      type: object
      deprecated: true
      description: |
        **006 Phase 4 向けドラフト（現行 API では使用しない）**。
        **事実契約の POST body は `TiMvpSubmitReviewAnswersRequest` のみ。**
        将来 `point_id` / `client_nonce` / 型付き `ReviewAnswer` を body に載せる場合のメモ用スキーマ。
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/ReviewAnswer"

    TiMvpSuppressionRecord:
      type: object
      description: MVP `GET .../suppression/` の配列要素（`SuppressionRecord` ORM の投影）。
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        workspace_id:
          type: string
        suppression_level:
          type: string
        suppression_reason:
          type: string
        suppressed_targets:
          type: array
          items: {}
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TiMvpSubmitReviewAnswersResponse:
      type: object
      description: |
        Django `ReviewSessionAnswersView` の 200 本文。`HumanReviewSessionSerializer` + `HumanReviewAnswerSerializer(created)`。
        **Request 契約は `TiMvpSubmitReviewAnswersRequest`**。
      required: [session, answers]
      properties:
        session:
          $ref: "#/components/schemas/TiMvpHumanReviewSession"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/TiMvpHumanReviewAnswer"
          description: 当該 POST で **新規作成された**回答行のみ（既存行の全件再掲ではない）。

    TiMvpHumanReviewAnswer:
      type: object
      description: |
        Django `HumanReviewAnswerSerializer` / ORM `HumanReviewAnswer` の事実形。**整数 PK `id`**。
        **`question_key` / `answer_value` が回答の契約**。006 の `answer_id`（UUID）/`point_id`/`client_nonce` 等は **未採用**（Phase 4 で **additive** しうる）。
      required:
        - id
        - session_id
        - question_key
        - answer_value
        - answered_by_id
        - answered_at
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          description: DB 主キー（自動採番）。
        session_id:
          type: string
          format: uuid
        question_key:
          type: string
        answer_value:
          description: リクエストの `answer_value` を永続化した JSON（任意形）。
          example:
            ok: true
        answered_by_id:
          type: integer
          nullable: true
          description: 認証ユーザの PK。未設定時は null。
        answered_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SuppressionStateResponse:
      type: object
      description: |
        将来の正規形（`session_id` + `records`）。**MVP 実装は本スキーマではなく `TiMvpSuppressionRecord[]` を返す**。
      properties:
        session_id:
          type: string
        records:
          type: array
          items:
            type: object
            additionalProperties: true

